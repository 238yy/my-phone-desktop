<div class="chat-module" style="background: inherit; min-height: 100vh;">
    <div class="page-header">
        <button class="back-btn" onclick="closeModule()"><i class="fas fa-arrow-left"></i></button>
        <span class="page-title">AI 聊天</span>
    </div>
    <div class="page-content" style="display: flex; flex-direction: column; justify-content: space-between; height: calc(100% - 70px);">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="输入消息...">
            <button id="sendMsgBtn">发送</button>
        </div>
    </div>
</div>

<style>
    /* 聊天模块专属样式 */
    .chat-module {
        background: inherit;
    }
    .page-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 18px 24px;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(20px);
        border-bottom: 0.5px solid rgba(0,0,0,0.05);
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .desktop[data-theme="dark"] .page-header {
        background: rgba(20,20,30,0.85);
        border-bottom-color: rgba(255,255,255,0.1);
    }
    .back-btn {
        background: none;
        border: none;
        font-size: 26px;
        cursor: pointer;
        color: #007AFF;
    }
    .page-title { font-size: 24px; font-weight: 600; }
    .page-content { padding: 24px; overflow-y: auto; flex: 1; }
    .chat-messages {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
        max-height: 60vh;
        overflow-y: auto;
    }
    .message {
        max-width: 85%;
        padding: 10px 16px;
        border-radius: 24px;
        font-size: 15px;
    }
    .user-msg {
        align-self: flex-end;
        background: #007AFF;
        color: white;
        border-bottom-right-radius: 5px;
    }
    .ai-msg {
        align-self: flex-start;
        background: #E9E9EF;
        color: #111;
        border-bottom-left-radius: 5px;
    }
    .desktop[data-theme="dark"] .ai-msg { background: #2C2C38; color: #eee; }
    .chat-input-area {
        display: flex;
        gap: 12px;
        margin-top: 12px;
    }
    .chat-input-area input {
        flex: 1;
        padding: 12px 18px;
        border-radius: 32px;
        border: 1px solid #ddd;
        background: #fff;
        font-size: 15px;
    }
    .desktop[data-theme="dark"] .chat-input-area input {
        background: #2c2c38;
        border-color: #444;
        color: white;
    }
    .chat-input-area button {
        background: #007AFF;
        border: none;
        padding: 0 22px;
        border-radius: 32px;
        color: white;
        font-weight: 600;
        cursor: pointer;
    }
</style>

<script>
    // 聊天模块的独立逻辑
    let chatHistory = JSON.parse(localStorage.getItem('chat_history')) || [
        { role: "ai", text: "你好！我是你的AI助手，有什么可以帮你？" }
    ];

    function renderChat() {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        container.innerHTML = '';
        chatHistory.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.role === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = msg.text;
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function aiResponse(userMsg) {
        let reply = "收到！我是你的AI小伙伴。";
        const lowerMsg = userMsg.toLowerCase();
        if (lowerMsg.includes('你好')||lowerMsg.includes('hi')) reply = "嗨！今天想聊点什么呢？";
        else if (lowerMsg.includes('天气')) reply = "小手机显示晴天，温度舒适☀️";
        else if (lowerMsg.includes('世界书')) reply = "世界书里有很多奇观，去桌面图标看看吧~";
        else if (lowerMsg.includes('美化')) reply = "进入美化中心切换主题和壁纸✨";
        else if (lowerMsg.includes('论坛')) reply = "论坛可以分享你的创意！";
        else if (window.globalSettings?.aiFriendly) reply = "✨ AI小助手: "+ userMsg.slice(0,30) + " … 很有趣！";
        else reply = "指令已收到。简洁模式。";
        return reply;
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        chatHistory.push({ role: "user", text: text });
        renderChat();
        input.value = '';
        const aiText = await aiResponse(text);
        chatHistory.push({ role: "ai", text: aiText });
        renderChat();
        localStorage.setItem('chat_history', JSON.stringify(chatHistory));
    }

    // 初始化
    function initChat() {
        renderChat();
        document.getElementById('sendMsgBtn')?.addEventListener('click', sendMessage);
        document.getElementById('chatInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    }

    // 当模块被加载时执行初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initChat);
    } else {
        initChat();
    }

    // 暴露给全局，以便缓存刷新时重新初始化（如果需要）
    window.init_chat = initChat;
</script>
