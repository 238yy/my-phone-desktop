<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI小手机桌面</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
}
body {
font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Icons', 'Helvetica Neue', Helvetica, Arial, sans-serif;
background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
}
.desktop {
    width: 100%;
    max-width: 400px;
    min-height: 700px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 30px 25px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position: relative;
    overflow: hidden;
}

.datetime-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    padding-top: 20px;
}

.weekday {
    font-size: 12px;
    color: #a67b9a;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 500;
    margin-bottom: 8px;
}

.date {
    font-size: 28px;
    font-weight: 300;
    color: #666;
}

.time-display {
    font-size: 48px;
    font-weight: 300;
    color: #333;
    letter-spacing: 1px;
    margin-top: 5px;
}

.widgets-grid {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 50px;
    gap: 20px;
    position: relative;
}

.avatar-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.avatar-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e6c1d7 0%, #f0d4e4 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: #a67b9a;
    box-shadow: 0 8px 25px rgba(166, 123, 154, 0.12);
    cursor: pointer;
    border: 3px solid rgba(255, 255, 255, 0.9);
    transition: all 0.3s ease;
    overflow: hidden;
    position: relative;
}

.avatar-circle:hover {
    transform: scale(1.05);
}

.avatar-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

.avatar-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
}

.avatar-upload {
    position: absolute;
    bottom: 5px;
    right: 5px;
    width: 28px;
    height: 28px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #a67b9a;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
}

.glass-section {
    flex: 2;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.glass-text-bar {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 12px;
    padding: 0 20px;
    height: 40px;
    box-shadow: 0 4px 20px rgba(166, 123, 154, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.5);
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative; /* 新增：支持拖拽定位 */
}

.glass-text-bar:hover {
    background: rgba(255, 255, 255, 0.85);
    transform: translateY(-1px);
}

.glass-text-bar:active {
    cursor: grabbing; /* 拖拽时样式 */
}

.glass-text-content {
    font-size: 15px;
    color: #666;
    font-weight: 400;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.glass-text-content:empty::before {
    content: '点击编辑内容';
    color: #bbb;
    font-style: italic;
}

.apps-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 20px;
    position: relative;
    min-height: 200px;
}

.app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: grab; /* 可拖拽样式 */
    transition: all 0.3s ease;
    position: relative;
    width: auto;
    z-index: 10;
}

.app:active {
    cursor: grabbing; /* 拖拽时样式 */
}

.app:hover {
    transform: translateY(-3px);
}

.app-icon {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    box-shadow: 0 6px 15px rgba(166, 123, 154, 0.12);
    transition: all 0.3s ease;
}

.app-name {
    font-size: 12px;
    color: #888;
    text-align: center;
    font-weight: 400;
}

.app-icon-wechat {
    background: linear-gradient(135deg, #d4a8c0 0%, #e8c6d9 100%);
}

.app-icon-settings {
    background: linear-gradient(135deg, #c1a8d4 0%, #d9c6e8 100%);
}

.app-icon-love {
    background: linear-gradient(135deg, #f0b6d9 0%, #f5d0e8 100%);
}

.app-icon-forum {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.drag-handle {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 20px;
    height: 20px;
    background: rgba(0, 0, 0, 0.05);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 5;
}

.drag-handle:active {
    cursor: grabbing;
}

.glass-text-bar:hover .drag-handle {
    opacity: 1;
}

.avatar-has-image .avatar-icon {
    display: none;
}

.avatar-has-image .avatar-image {
    display: block;
}

.app-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.modal-content {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 40px 30px;
    max-width: 320px;
    text-align: center;
    color: #666;
    transform: scale(0.9);
    transition: transform 0.3s ease;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.modal-icon {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
}

.modal-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
    color: #a67b9a;
}

.modal-desc {
    font-size: 15px;
    color: #888;
    margin-bottom: 25px;
    line-height: 1.5;
}

.modal-close {
    background: linear-gradient(135deg, #d4a8c0 0%, #e8c6d9 100%);
    border: none;
    color: white;
    padding: 12px 30px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: all 0.2s ease;
}

.modal-close:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(166, 123, 154, 0.2);
}

.edit-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1001;
}

.edit-content {
    background: white;
    border-radius: 20px;
    padding: 30px;
    max-width: 300px;
    width: 90%;
}

.edit-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #a67b9a;
    text-align: center;
}

.edit-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.edit-input {
    padding: 12px 15px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    color: #666;
}

.edit-input:focus {
    outline: none;
    border-color: #d4a8c0;
}

.edit-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.edit-save, .edit-cancel {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
}

.edit-save {
    background: linear-gradient(135deg, #d4a8c0 0%, #e8c6d9 100%);
    color: white;
}

.edit-cancel {
    background: #f5f5f5;
    color: #888;
}

.image-upload-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1002;
}

.image-upload-content {
    background: white;
    border-radius: 20px;
    padding: 30px;
    max-width: 300px;
    width: 90%;
    text-align: center;
}

.upload-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #a67b9a;
}

.upload-input {
    width: 100%;
    padding: 12px 15px;
    border: 2px dashed #d4a8c0;
    border-radius: 10px;
    margin-bottom: 20px;
    cursor: pointer;
}

.upload-buttons {
    display: flex;
    gap: 10px;
}

.upload-save, .upload-cancel {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
}

.upload-save {
    background: linear-gradient(135deg, #d4a8c0 0%, #e8c6d9 100%);
    color: white;
}

.upload-cancel {
    background: #f5f5f5;
    color: #888;
}

.desktop-info {
    position: absolute;
    bottom: 20px;
    left: 0;
    width: 100%;
    text-align: center;
    color: #ccc;
    font-size: 12px;
    font-weight: 400;
}

/* 新增：拖拽时的Z-index提升 */
.dragging {
    z-index: 100 !important;
    position: absolute !important;
}

@media (max-width: 450px) {
    .desktop {
        padding: 20px 15px;
        border-radius: 20px;
    }
    
    .widgets-grid {
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }
    
    .glass-section {
        width: 100%;
    }
    
    .apps-container {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }
    
    .app {
        width: auto;
    }
}
</style>
</head>
<body>
<div class="desktop">
<div class="datetime-container">
<div class="weekday" id="weekday">星期一</div>
<div class="date" id="date">3月24日</div>
<div class="time-display" id="timeDisplay">14:30</div>
</div>
<div class="widgets-grid" id="widgetsGrid">
    <div class="avatar-section">
        <div class="avatar-circle" id="avatarCircle">
            <img class="avatar-image" id="avatarImage" src="" alt="头像">
            <div class="avatar-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="avatar-upload" onclick="showImageUpload()">
                <i class="fas fa-camera"></i>
            </div>
        </div>
    </div>
    
    <div class="glass-section">
        <div class="glass-text-bar" id="textBar1Container" onclick="editTextBar(0)">
            <div class="glass-text-content" id="textBar1">今日心情：美好的一天</div>
            <div class="drag-handle" onclick="event.stopPropagation(); startDragTextBar(0)">
                <i class="fas fa-arrows-alt" style="font-size: 10px; color: #666;"></i>
            </div>
        </div>
        <div class="glass-text-bar" id="textBar2Container" onclick="editTextBar(1)">
            <div class="glass-text-content" id="textBar2">待办事项：完成项目</div>
            <div class="drag-handle" onclick="event.stopPropagation(); startDragTextBar(1)">
                <i class="fas fa-arrows-alt" style="font-size: 10px; color: #666;"></i>
            </div>
        </div>
    </div>
</div>

<div class="apps-container" id="appsContainer">
    <div class="app" id="app-wechat" onclick="!isDragging && openApp('wechat')">
        <div class="app-icon app-icon-wechat">
            <i class="fab fa-weixin"></i>
        </div>
        <div class="app-name">微信</div>
    </div>
    
    <div class="app" id="app-settings" onclick="!isDragging && openApp('settings')">
        <div class="app-icon app-icon-settings">
            <i class="fas fa-cog"></i>
        </div>
        <div class="app-name">设置</div>
    </div>
    
    <div class="app" id="app-love" onclick="!isDragging && openApp('love')">
        <div class="app-icon app-icon-love">
            <i class="fas fa-heart"></i>
        </div>
        <div class="app-name">情侣空间</div>
    </div>
    
    <div class="app" id="app-forum" onclick="!isDragging && openApp('forum')">
        <div class="app-icon app-icon-forum">
            <i class="fas fa-comments"></i>
        </div>
        <div class="app-name">论坛</div>
    </div>
</div>

<div class="desktop-info">
    拖动图标和文本条 · 点击编辑文本 · 点击头像上传图片
</div>
</div>

<div class="app-modal" id="appModal">
<div class="modal-content">
    <div class="modal-icon" id="modalIcon"></div>
    <div class="modal-title" id="modalTitle">应用名称</div>
    <div class="modal-desc" id="modalDesc">应用描述</div>
    <button class="modal-close" onclick="closeModal()">打开应用</button>
</div>
</div>

<div class="edit-modal" id="editModal">
<div class="edit-content">
    <div class="edit-title" id="editTitle">编辑文本</div>
    <div class="edit-form">
        <textarea class="edit-input" id="textBarInput" placeholder="输入文本内容" rows="3"></textarea>
    </div>
    <div class="edit-buttons">
        <button class="edit-cancel" onclick="closeEditModal()">取消</button>
        <button class="edit-save" onclick="saveTextBar()">保存</button>
    </div>
</div>
</div>

<div class="image-upload-container" id="imageUploadContainer">
<div class="image-upload-content">
    <div class="upload-title">上传头像</div>
    <input type="file" id="imageUploadInput" class="upload-input" accept="image/*">
    <div class="upload-buttons">
        <button class="upload-cancel" onclick="closeImageUpload()">取消</button>
        <button class="upload-save" onclick="uploadImage()">上传</button>
    </div>
</div>
</div>

<script>
const apps = {
    wechat: { 
        name: '微信', 
        icon: 'fab fa-weixin', 
        color: 'linear-gradient(135deg, #d4a8c0 0%, #e8c6d9 100%)',
        description: '即时通讯应用，支持文字、语音、视频聊天',
        x: 0,
        y: 0
    },
    settings: { 
        name: '设置', 
        icon: 'fas fa-cog', 
        color: 'linear-gradient(135deg, #c1a8d4 0%, #d9c6e8 100%)',
        description: '系统设置，个性化配置和偏好管理',
        x: 100,
        y: 0
    },
    love: { 
        name: '情侣空间', 
        icon: 'fas fa-heart', 
        color: 'linear-gradient(135deg, #f0b6d9 0%, #f5d0e8 100%)',
        description: '情侣专属空间，记录甜蜜时刻',
        x: 200,
        y: 0
    },
    forum: { 
        name: '论坛', 
        icon: 'fas fa-comments', 
        color: 'linear-gradient(135deg, #6667eea 0%, #764ba2 100%)',
        description: '社区论坛，分享和交流',
        x: 0,
        y: 100
    }
};

let textBars = [
    { content: '今日心情：美好的一天', x: 0, y: 0 },
    { content: '待办事项：完成项目', x: 0, y: 50 }
];

let currentEditIndex = -1;
let draggingElement = null;
let dragOffsetX = 0;
let dragOffsetY = 0;
let isDragging = false;

// ========== 拖拽功能核心代码 ==========
// 初始化应用位置
function initAppPositions() {
    const savedPositions = JSON.parse(localStorage.getItem('appPositions') || '{}');
    const appsContainer = document.getElementById('appsContainer');
    
    // 设置初始位置
    Object.keys(apps).forEach((appId, index) => {
        const app = apps[appId];
        const appElement = document.getElementById(`app-${appId}`);
        
        // 重置为正常文档流
        appElement.style.position = 'relative';
        appElement.style.left = 'auto';
        appElement.style.top = 'auto';
        
        // 如果有保存的位置，才启用绝对定位
        if (savedPositions[appId]) {
            app.x = savedPositions[appId].x;
            app.y = savedPositions[appId].y;
            appElement.style.position = 'absolute';
            appElement.style.left = `${app.x}px`;
            appElement.style.top = `${app.y}px`;
        }
        
        // 绑定拖拽事件
        appElement.addEventListener('mousedown', (e) => startDragApp(e, appId));
        appElement.addEventListener('touchstart', (e) => startDragAppTouch(e, appId));
    });
    
    // 初始化文本条位置
    const savedTextBarPositions = JSON.parse(localStorage.getItem('textBarPositions') || '{}');
    textBars.forEach((textBar, index) => {
        const textBarElement = document.getElementById(`textBar${index + 1}Container`);
        
        if (savedTextBarPositions[index]) {
            textBar.x = savedTextBarPositions[index].x;
            textBar.y = savedTextBarPositions[index].y;
            textBarElement.style.left = `${textBar.x}px`;
            textBarElement.style.top = `${textBar.y}px`;
        }
    });
}

// 鼠标拖拽应用
function startDragApp(e, appId) {
    e.preventDefault();
    isDragging = true;
    const appElement = document.getElementById(`app-${appId}`);
    draggingElement = {
        type: 'app',
        id: appId,
        element: appElement
    };
    
    const rect = appElement.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    
    appElement.classList.add('dragging');
    
    document.addEventListener('mousemove', dragApp);
    document.addEventListener('mouseup', stopDragApp);
}

// 触摸拖拽应用
function startDragAppTouch(e, appId) {
    e.preventDefault();
    isDragging = true;
    const touch = e.touches[0];
    const appElement = document.getElementById(`app-${appId}`);
    draggingElement = {
        type: 'app',
        id: appId,
        element: appElement
    };
    
    const rect = appElement.getBoundingClientRect();
    dragOffsetX = touch.clientX - rect.left;
    dragOffsetY = touch.clientY - rect.top;
    
    appElement.classList.add('dragging');
    
    document.addEventListener('touchmove', dragAppTouch);
    document.addEventListener('touchend', stopDragApp);
}

// 拖拽应用移动（鼠标）
function dragApp(e) {
    if (!draggingElement || draggingElement.type !== 'app') return;
    
    const appsContainer = document.getElementById('appsContainer');
    const containerRect = appsContainer.getBoundingClientRect();
    const appElement = draggingElement.element;
    
    let x = e.clientX - containerRect.left - dragOffsetX;
    let y = e.clientY - containerRect.top - dragOffsetY;
    
    // 边界限制
    x = Math.max(0, Math.min(x, containerRect.width - appElement.offsetWidth));
    y = Math.max(0, Math.min(y, containerRect.height - appElement.offsetHeight));
    
    appElement.style.left = `${x}px`;
    appElement.style.top = `${y}px`;
}

// 拖拽应用移动（触摸）
function dragAppTouch(e) {
    if (!draggingElement || draggingElement.type !== 'app' || !e.touches[0]) return;
    
    const touch = e.touches[0];
    const appsContainer = document.getElementById('appsContainer');
    const containerRect = appsContainer.getBoundingClientRect();
    const appElement = draggingElement.element;
    
    let x = touch.clientX - containerRect.left - dragOffsetX;
    let y = touch.clientY - containerRect.top - dragOffsetY;
    
    // 边界限制
    x = Math.max(0, Math.min(x, containerRect.width - appElement.offsetWidth));
    y = Math.max(0, Math.min(y, containerRect.height - appElement.offsetHeight));
    
    appElement.style.left = `${x}px`;
    appElement.style.top = `${y}px`;
}

// 停止拖拽应用
function stopDragApp() {
    if (draggingElement && draggingElement.type === 'app') {
        // 保存位置
        const appId = draggingElement.id;
        const appElement = draggingElement.element;
        apps[appId].x = parseInt(appElement.style.left) || 0;
        apps[appId].y = parseInt(appElement.style.top) || 0;
        
        const positions = JSON.parse(localStorage.getItem('appPositions') || '{}');
        positions[appId] = {
            x: apps[appId].x,
            y: apps[appId].y
        };
        localStorage.setItem('appPositions', JSON.stringify(positions));
        
        appElement.classList.remove('dragging');
    }
    
    draggingElement = null;
    isDragging = false;
    
    document.removeEventListener('mousemove', dragApp);
    document.removeEventListener('touchmove', dragAppTouch);
    document.removeEventListener('mouseup', stopDragApp);
    document.removeEventListener('touchend', stopDragApp);
}

// 开始拖拽文本条
function startDragTextBar(index) {
    const textBarElement = document.getElementById(`textBar${index + 1}Container`);
    draggingElement = {
        type: 'textBar',
        index: index,
        element: textBarElement
    };
    
    // 鼠标拖拽
    document.addEventListener('mousemove', (e) => dragTextBar(e, index));
    document.addEventListener('mouseup', () => stopDragTextBar(index));
    
    // 触摸拖拽
    document.addEventListener('touchmove', (e) => dragTextBarTouch(e, index));
    document.addEventListener('touchend', () => stopDragTextBar(index));
    
    textBarElement.classList.add('dragging');
    isDragging = true;
}

// 拖拽文本条（鼠标）
function dragTextBar(e, index) {
    if (!draggingElement || draggingElement.type !== 'textBar') return;
    
    const glassSection = document.querySelector('.glass-section');
    const sectionRect = glassSection.getBoundingClientRect();
    const textBarElement = draggingElement.element;
    
    // 计算偏移
    if (dragOffsetX === 0 && dragOffsetY === 0) {
        const rect = textBarElement.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
    }
    
    let x = e.clientX - sectionRect.left - dragOffsetX;
    let y = e.clientY - sectionRect.top - dragOffsetY;
    
    // 边界限制
    x = Math.max(0, Math.min(x, sectionRect.width - textBarElement.offsetWidth));
    y = Math.max(0, Math.min(y, sectionRect.height - textBarElement.offsetHeight));
    
    textBarElement.style.left = `${x}px`;
    textBarElement.style.top = `${y}px`;
}

// 拖拽文本条（触摸）
function dragTextBarTouch(e, index) {
    if (!draggingElement || draggingElement.type !== 'textBar' || !e.touches[0]) return;
    
    const touch = e.touches[0];
    const glassSection = document.querySelector('.glass-section');
    const sectionRect = glassSection.getBoundingClientRect();
    const textBarElement = draggingElement.element;
    
    // 计算偏移
    if (dragOffsetX === 0 && dragOffsetY === 0) {
        const rect = textBarElement.getBoundingClientRect();
        dragOffsetX = touch.clientX - rect.left;
        dragOffsetY = touch.clientY - rect.top;
    }
    
    let x = touch.clientX - sectionRect.left - dragOffsetX;
    let y = touch.clientY - sectionRect.top - dragOffsetY;
    
    // 边界限制
    x = Math.max(0, Math.min(x, sectionRect.width - textBarElement.offsetWidth));
    y = Math.max(0, Math.min(y, sectionRect.height - textBarElement.offsetHeight));
    
    textBarElement.style.left = `${x}px`;
    textBarElement.style.top = `${y}px`;
}

// 停止拖拽文本条
function stopDragTextBar(index) {
    if (draggingElement && draggingElement.type === 'textBar') {
        const textBarElement = draggingElement.element;
        textBars[index].x = parseInt(textBarElement.style.left) || 0;
        textBars[index].y = parseInt(textBarElement.style.top) || 0;
        
        // 保存位置
        const positions = JSON.parse(localStorage.getItem('textBarPositions') || '{}');
        positions[index] = {
            x: textBars[index].x,
            y: textBars[index].y
        };
        localStorage.setItem('textBarPositions', JSON.stringify(positions));
        
        textBarElement.classList.remove('dragging');
    }
    
    dragOffsetX = 0;
    dragOffsetY = 0;
    draggingElement = null;
    isDragging = false;
    
    document.removeEventListener('mousemove', dragTextBar);
    document.removeEventListener('touchmove', dragTextBarTouch);
    document.removeEventListener('mouseup', stopDragTextBar);
    document.removeEventListener('touchend', stopDragTextBar);
}

// ========== 原有功能保留并优化 ==========
function openApp(appId) {
    const app = apps[appId];
    
    if (!app) return;
    
    document.getElementById('modalIcon').innerHTML = `<i class="${app.icon}"></i>`;
    document.getElementById('modalIcon').style.background = app.color;
    document.getElementById('modalTitle').textContent = app.name;
    document.getElementById('modalDesc').textContent = app.description;
    
    const modal = document.getElementById('appModal');
    modal.style.display = 'flex';
    
    setTimeout(() => {
        modal.style.opacity = '1';
        document.querySelector('.modal-content').style.transform = 'scale(1)';
    }, 10);
}

function editTextBar(index) {
    if (isDragging) return; // 拖拽时不触发编辑
    
    currentEditIndex = index;
    const textBar = textBars[index];
    
    document.getElementById('editTitle').textContent = `编辑文本条 ${index + 1}`;
    document.getElementById('textBarInput').value = textBar.content;
    
    document.getElementById('editModal').style.display = 'flex';
}

function saveTextBar() {
    if (currentEditIndex >= 0) {
        const newContent = document.getElementById('textBarInput').value.trim();
        
        if (newContent) {
            textBars[currentEditIndex].content = newContent;
            document.getElementById(`textBar${currentEditIndex + 1}`).textContent = newContent;
            localStorage.setItem('textBarsData', JSON.stringify(textBars));
        }
    }
    
    closeEditModal();
}

function showImageUpload() {
    document.getElementById('imageUploadContainer').style.display = 'flex';
}

function closeImageUpload() {
    document.getElementById('imageUploadContainer').style.display = 'none';
}

function uploadImage() {
    const fileInput = document.getElementById('imageUploadInput');
    const file = fileInput.files[0];
    
    if (file) {
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const avatarImage = document.getElementById('avatarImage');
                const avatarCircle = document.getElementById('avatarCircle');
                
                avatarImage.src = e.target.result;
                avatarCircle.classList.add('avatar-has-image');
                
                localStorage.setItem('avatarImage', e.target.result);
            };
            reader.readAsDataURL(file);
            
            closeImageUpload();
        } else {
            alert('请选择图片文件');
        }
    } else {
        alert('请选择图片文件');
    }
}

function closeModal() {
    const modal = document.getElementById('appModal');
    document.querySelector('.modal-content').style.transform = 'scale(0.9)';
    modal.style.opacity = '0';
    
    setTimeout(() => {
        modal.style.display = 'none';
    }, 300);
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
    currentEditIndex = -1;
}

function updateDateTime() {
    const now = new Date();
    
    const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    const weekday = weekdays[now.getDay()];
    const month = now.getMonth() + 1;
    const day = now.getDate();
    
    document.getElementById('weekday').textContent = weekday;
    document.getElementById('date').textContent = `${month}月${day}日`;
    
    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('timeDisplay').textContent = `${hours}:${minutes}`;
}

function loadSavedData() {
    // 加载文本内容
    const savedTextBars = localStorage.getItem('textBarsData');
    if (savedTextBars) {
        textBars = JSON.parse(savedTextBars);
        textBars.forEach((textBar, index) => {
            document.getElementById(`textBar${index + 1}`).textContent = textBar.content;
        });
    }
    
    // 加载头像
    const savedAvatarImage = localStorage.getItem('avatarImage');
    if (savedAvatarImage) {
        const avatarImage = document.getElementById('avatarImage');
        const avatarCircle = document.getElementById('avatarCircle');
        avatarImage.src = savedAvatarImage;
        avatarCircle.classList.add('avatar-has-image');
    }
    
    // 初始化位置
    initAppPositions();
}

document.addEventListener('DOMContentLoaded', function() {
    loadSavedData();
    updateDateTime();
    
    setInterval(updateDateTime, 60000);
    
    // 模态框点击外部关闭
    document.getElementById('appModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });
    
    document.getElementById('editModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeEditModal();
        }
    });
    
    document.getElementById('imageUploadContainer').addEventListener('click', function(e) {
        if (e.target === this) {
            closeImageUpload();
        }
    });
});
</script>
