<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F5F7FE">
    <title>AI小手机 · 智能桌面</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="desktop" id="desktopApp" data-theme="light">
    <div class="status-bar">
        <span>9:41</span>
        <span><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></span>
    </div>
    <div class="main-content">
        <!-- 顶部小组件（全局） -->
        <div class="compact-widget">
            <div class="datetime-group">
                <span class="time" id="liveTime">--:--</span>
                <span class="date" id="liveDate"></span>
            </div>
            <div class="weather-group">
                <i class="fas fa-cloud-sun"></i>
                <span id="weatherTemp">22°</span>
            </div>
            <div class="greeting">
                <i class="fas fa-robot"></i> 智能助手在线
            </div>
        </div>

        <!-- 中间应用网格（聊天和论坛） -->
        <div class="middle-apps">
            <div class="app-icon" data-module="chat">
                <div class="icon-bg"><i class="fas fa-comment-dots"></i></div>
                <span class="app-name">聊天AI</span>
            </div>
            <div class="app-icon" data-module="forum">
                <div class="icon-bg"><i class="fas fa-users"></i></div>
                <span class="app-name">论坛</span>
            </div>
        </div>

        <!-- 底部 Dock（设置、美化、世界书） -->
        <div class="dock">
            <div class="dock-item" data-module="settings">
                <div class="dock-icon"><i class="fas fa-sliders-h"></i></div>
                <span class="dock-label">设置</span>
            </div>
            <div class="dock-item" data-module="beautify">
                <div class="dock-icon"><i class="fas fa-palette"></i></div>
                <span class="dock-label">美化</span>
            </div>
            <div class="dock-item" data-module="worldbook">
                <div class="dock-icon"><i class="fas fa-globe-asia"></i></div>
                <span class="dock-label">世界书</span>
            </div>
        </div>
        <div class="footer-note">AI小手机 · 灵感随行</div>
    </div>

    <!-- 动态加载的功能模块容器 -->
    <div id="module-container" class="module-container"></div>
</div>

<script src="js/app.js"></script>
<script src="js/loadModule.js"></script>
</body>
</html>
